version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: resume_analyzer_db
    environment:
      POSTGRES_USER: ${DB_USER:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-resume_analyzer}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - resume_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resume_analyzer_api
    command: flask run --host=0.0.0.0
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: development
      DATABASE_URL: postgresql://${DB_USER:-user}:${DB_PASSWORD:-password}@postgres:5432/${DB_NAME:-resume_analyzer}
    depends_on:
      - postgres
    volumes:
      - ./backend:/app
    networks:
      - resume_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: resume_analyzer_web
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000
    depends_on:
      - backend
    networks:
      - resume_network

volumes:
  postgres_data:

networks:
  resume_network:
    driver: bridge